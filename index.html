<style>
:root {
  --color-sidebar-bg:#0F172A;--color-sidebar-text:#94A3B8;--color-sidebar-active:#3B82F6;
  --color-sidebar-active-text:#FFF;--color-accent:#3B82F6;--color-accent-hover:#2563EB;
  --color-bg:#F8FAFC;--color-surface:#FFF;--color-border:#E2E8F0;
  --color-text-primary:#0F172A;--color-text-secondary:#64748B;--color-text-muted:#94A3B8;
  --color-trend-up:#10B981;--color-trend-down:#EF4444;
  --font-xs:11px;--font-sm:13px;--font-base:14px;--font-md:16px;--font-lg:24px;--font-xl:28px;--font-2xl:32px;
}
body.dark-mode {
  --color-bg:#0F172A;--color-surface:#1E293B;--color-border:#334155;
  --color-text-primary:#F1F5F9;--color-text-secondary:#94A3B8;--color-text-muted:#64748B;
  --color-sidebar-bg:#020617;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;font-size:var(--font-base);background:var(--color-bg);color:var(--color-text-primary);min-height:100vh}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:240px;min-width:240px;height:100vh;position:fixed;left:0;top:0;background:var(--color-sidebar-bg);overflow-y:auto;transition:width 0.3s ease;z-index:100}
#main-wrapper{margin-left:240px;transition:margin-left 0.3s ease;flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{height:64px;min-height:64px;background:var(--color-surface);border-bottom:1px solid var(--color-border);display:flex;align-items:center;padding:0 24px}
#content{flex:1;overflow-y:auto;padding:24px;background:var(--color-bg)}
#modal-overlay{position:fixed;inset:0;z-index:1000;pointer-events:none}
body.modal-open #modal-overlay{pointer-events:all}

.toast-container{position:fixed;bottom:24px;right:24px;z-index:3000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:8px;color:#FFF;font-size:13px;font-weight:500;animation:slideIn .3s ease;max-width:360px;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.toast--success{background:#10B981}.toast--error{background:#EF4444}
.toast--warning{background:#F59E0B}.toast--info{background:#3B82F6}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--color-bg);padding:24px}
.login-card{background:var(--color-surface);border-radius:16px;border:1px solid var(--color-border);padding:40px 36px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.login-card h1{font-size:var(--font-xl);font-weight:700;text-align:center;margin-bottom:4px}
.login-subtitle{font-size:var(--font-sm);color:var(--color-text-secondary);text-align:center;margin-bottom:28px}
.login-logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px}
.login-logo svg{color:var(--color-accent)}
.login-logo span{font-size:var(--font-md);font-weight:700}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.form-label{font-size:13px;font-weight:500;color:var(--color-text-secondary)}
.form-input{padding:10px 12px;border:1px solid var(--color-border);border-radius:8px;font-size:14px;font-family:inherit;color:var(--color-text-primary);background:var(--color-bg);width:100%;transition:border-color .15s ease,box-shadow .15s ease}
.form-input:focus{outline:none;border-color:var(--color-accent);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.form-error{font-size:12px;color:#EF4444;display:none;margin-top:2px}
.form-error.visible{display:block}
.btn-primary{display:block;width:100%;padding:12px 20px;background:var(--color-accent);color:#FFF;border:none;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s ease,transform .1s ease}
.btn-primary:hover{background:var(--color-accent-hover);transform:translateY(-1px)}
.login-error{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:10px 14px;color:#991B1B;font-size:13px;margin-bottom:16px;display:none}
.login-error.visible{display:block}

/* ============================
   APPAUTH
   ============================ */
const AppAuth = (() => {
  async function hashPw(pw) {
    const e = new TextEncoder();
    const b = await crypto.subtle.digest("SHA-256",e.encode(pw));
    return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join("");
  }
  async function login(email,pw) {
    const users = await AppDB.getAll("users");
    const u = users.find(x=>x.email===email);
    if(!u) throw new Error("Invalid email or password");
    if(await hashPw(pw) !== u.passwordHash) throw new Error("Invalid email or password");
    const s = {id:u.id,name:u.name,email:u.email,role:u.role,avatar:u.avatar||u.name.charAt(0).toUpperCase()};
    sessionStorage.setItem(AppConfig.SESSION_KEY,JSON.stringify(s));
    return s;
  }
  function logout(){sessionStorage.removeItem(AppConfig.SESSION_KEY);location.reload()}
  function getSession(){const r=sessionStorage.getItem(AppConfig.SESSION_KEY);if(!r)return null;try{return JSON.parse(r)}catch{return null}}
  function isAuth(){return getSession()!==null}
  function getRole(){const s=getSession();return s?s.role:null}
  function hasPerm(p){const r=getRole();if(!r)return false;if(r===AppConfig.ROLES.SUPER_ADMIN)return true;return(AppConfig.PERMISSIONS[r]||[]).includes(p)}
  async function createUser(d){const h=await hashPw(d.password);return AppDB.put("users",{name:d.name,email:d.email,passwordHash:h,role:d.role||AppConfig.ROLES.EMPLOYEE,createdAt:new Date().toISOString(),avatar:d.name.split(" ").map(w=>w[0]).join("").toUpperCase()})}
  async function deleteUser(id){return AppDB.del("users",id)}
  function getUsers(){return AppDB.getAll("users")}
  return{login,logout,getSession,isAuth,getRole,hasPerm,createUser,deleteUser,getUsers};
})();

/* ============================
   APPUI — Helpers
   ============================ */
const AppUI = {
  showToast(msg,type){
    const c = document.querySelector('.toast-container') || (()=>{const x=document.createElement('div');x.className='toast-container';document.body.appendChild(x);return x})();
    const t = document.createElement('div');
    t.className = 'toast toast--'+type;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(()=>{t.remove();if(!c.children.length)c.remove()},AppConfig.TOAST_DURATION);
  }
};

  document.getElementById('app').style.display = 'none';
  const old = document.querySelector('.login-screen');
  if(old) old.remove();

  const div = document.createElement('div');
  div.className = 'login-screen';
  div.innerHTML = `<div class="login-card">
    <div class="login-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="12" width="3" height="9" rx="1"/><rect x="10" y="7" width="3" height="14" rx="1"/><rect x="17" y="3" width="3" height="18" rx="1"/></svg>
      <span>SalesHub</span>
    </div>
    <h1>Welcome back</h1>
    <p class="login-subtitle">Sign in to your account</p>
    <div class="login-error ${msg?'visible':''}" id="login-error">${msg||''}</div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="login-email" placeholder="admin@saleshub.com" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="login-password" placeholder="Enter password" autocomplete="current-password">
    </div>
    <div class="form-error" id="login-field-error"></div>
    <button class="btn-primary" id="login-btn">Sign In</button>
  </div>`;
  document.body.appendChild(div);

  const emailEl = document.getElementById('login-email');
  const passEl = document.getElementById('login-password');
  const btn = document.getElementById('login-btn');
  const fe = document.getElementById('login-field-error');
  const le = document.getElementById('login-error');

  function showErr(m){fe.textContent=m;fe.classList.add('visible')}
  function clearErr(){fe.textContent='';fe.classList.remove('visible')}
  function loading(v){btn.textContent=v?'Signing in...':'Sign In';btn.disabled=v}

  async function handleLogin(){
    clearErr();if(le){le.textContent='';le.classList.remove('visible')}
    const e=emailEl.value.trim(),p=passEl.value;
    if(!e){showErr('Email is required');return}
    if(!p){showErr('Password is required');return}
    loading(true);
    try{await AppAuth.login(e,p);loading(false);initApp()}
    catch(err){loading(false);showErr(err.message)}
  }
  btn.addEventListener('click',handleLogin);
  passEl.addEventListener('keydown',ev=>{if(ev.key==='Enter')handleLogin()});
  emailEl.addEventListener('keydown',ev=>{if(ev.key==='Enter')passEl.focus()});
}

function initApp() {
  const loginScreen = document.querySelector('.login-screen');
  if(loginScreen) loginScreen.remove();
  document.getElementById('app').style.display = 'flex';
  renderSidebar();
  renderTopbar();
  document.getElementById('content').innerHTML = `
    <div style="text-align:center;padding:80px 20px">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--color-accent)" stroke-width="1.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      <h2 style="margin:16px 0 8px;font-size:var(--font-xl)">Welcome to SalesHub</h2>
      <p style="color:var(--color-text-secondary);font-size:var(--font-base)">Signed in as <strong>${AppAuth.getSession().name}</strong> (${AppAuth.getSession().role})</p>
      <p style="color:var(--color-text-muted);font-size:var(--font-sm);margin-top:4px">Dashboard and CRM features coming in Phase 4</p>
    </div>`;
}

function renderTopbar() {
  const s = AppAuth.getSession();
  document.getElementById('topbar').innerHTML = `

      <div style="width:36px;height:36px;border-radius:50%;background:var(--color-accent);color:#FFF;display:flex;align-items:center;justify-content:center;font-size:var(--font-sm);font-weight:600">${s.avatar}</div>

/* ============================
   BOOTSTRAP
   ============================ */
AppDB.init().then(async () => {
  await AppDB.seedAll();
  if(!AppAuth.isAuth()) { showLogin(); return; }
  initApp();
}).catch(err => console.error("Init failed:", err));
</script>
</body>
