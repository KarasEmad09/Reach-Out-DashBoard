<!DOCTYPE html>

<head>

    :root {
      --color-sidebar-bg: #0F172A;
      --color-sidebar-text: #94A3B8;
      --color-sidebar-active: #3B82F6;
      --color-sidebar-active-text: #FFFFFF;
      --color-accent: #3B82F6;
      --color-accent-hover: #2563EB;
      --color-bg: #F8FAFC;
      --color-surface: #FFFFFF;
      --color-border: #E2E8F0;
      --color-text-primary: #0F172A;
      --color-text-secondary: #64748B;
      --color-text-muted: #94A3B8;
      --color-trend-up: #10B981;
      --color-trend-down: #EF4444;
      --font-xs: 11px; --font-sm: 13px; --font-base: 14px; --font-md: 16px; --font-lg: 24px; --font-xl: 28px; --font-2xl: 32px;
    }
    body.dark-mode {
      --color-bg: #0F172A; --color-surface: #1E293B; --color-border: #334155;
      --color-text-primary: #F1F5F9; --color-text-secondary: #94A3B8; --color-text-muted: #64748B;
      --color-sidebar-bg: #020617;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter',-apple-system,BlinkMacSystemFont,sans-serif; font-size: var(--font-base); background: var(--color-bg); color: var(--color-text-primary); -webkit-font-smoothing: antialiased; }
    #app { display: flex; height: 100vh; overflow: hidden; }
    #sidebar { width: 240px; min-width: 240px; height: 100vh; position: fixed; left: 0; top: 0; background: var(--color-sidebar-bg); overflow-y: auto; transition: width 0.3s ease; z-index: 1000; }
    #main-wrapper { margin-left: 240px; transition: margin-left 0.3s ease; flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #topbar { height: 64px; min-height: 64px; background: var(--color-surface); border-bottom: 1px solid var(--color-border); display: flex; align-items: center; padding: 0 24px; }
    #content { flex: 1; overflow-y: auto; padding: 24px; background: var(--color-bg); }
    #modal-overlay { position: fixed; inset: 0; z-index: 1000; pointer-events: none; }
    body.modal-open #modal-overlay { pointer-events: all; }

    /* Toast notifications */
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 12px 20px; border-radius: 8px; color: #FFF; font-size: 13px; font-weight: 500; animation: slideIn 0.3s ease; max-width: 360px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .toast--success { background: #10B981; }
    .toast--error { background: #EF4444; }
    .toast--warning { background: #F59E0B; }
    .toast--info { background: #3B82F6; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }

    /* Login page */
    .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--color-bg); padding: 24px; }
    .login-card { background: var(--color-surface); border-radius: 16px; border: 1px solid var(--color-border); padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .login-card h1 { font-size: var(--font-xl); font-weight: 700; color: var(--color-text-primary); text-align: center; margin-bottom: 4px; }
    .login-card .login-subtitle { font-size: var(--font-sm); color: var(--color-text-secondary); text-align: center; margin-bottom: 28px; }
    .login-logo { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; }
    .login-logo svg { color: var(--color-accent); }
    .login-logo span { font-size: var(--font-md); font-weight: 700; color: var(--color-text-primary); }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-label { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); }
    .form-input { padding: 10px 12px; border: 1px solid var(--color-border); border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--color-text-primary); background: var(--color-bg); width: 100%; transition: border-color 0.15s ease, box-shadow 0.15s ease; }
    .form-input:focus { outline: none; border-color: var(--color-accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .form-error { font-size: 12px; color: #EF4444; display: none; margin-top: 2px; }
    .form-error.visible { display: block; }
    .btn-primary { display: block; width: 100%; padding: 12px 20px; background: var(--color-accent); color: #FFF; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background 0.15s ease, transform 0.1s ease; }
    .btn-primary:hover { background: var(--color-accent-hover); transform: translateY(-1px); }
    .login-error { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 8px; padding: 10px 14px; color: #991B1B; font-size: 13px; margin-bottom: 16px; display: none; }

   APPCONFIG — Constants & Configuration
   ============================================ */
const AppConfig = {
  SOURCES: ["Facebook Ads","Instagram Ads","Website Form","Referral","WhatsApp","LinkedIn","Cold Outreach","Manual Entry"],

    { key: "Follow Up", color: "#8B5CF6", bg: "#F5F3FF" },
    { key: "Won Deal", color: "#10B981", bg: "#ECFDF5" },
    { key: "Lost Deal", color: "#6B7280", bg: "#F9FAFB" }
  ],
  ROLES: { SUPER_ADMIN: "super_admin", ADMIN: "admin", EMPLOYEE: "employee" },
  PERMISSIONS: {
    super_admin: ["all"],
    admin: ["manage_customers","manage_tasks","view_reports","view_audit"],
    employee: ["view_assigned_customers","view_assigned_tasks","add_notes"]
  },
  TASK_STATUSES: ["todo","in_progress","done","overdue"],
  TASK_PRIORITIES: [
    { key: "low", color: "#6B7280", label: "Low" },
    { key: "medium", color: "#F59E0B", label: "Medium" },
    { key: "high", color: "#EF4444", label: "High" },
    { key: "urgent", color: "#DC2626", label: "Urgent" }
  ],
  NOTIFICATION_TYPES: ["task_assigned","status_change","follow_up","note_added","customer_assigned","task_due","task_overdue"],
  AUDIT_ACTIONS: ["created","updated","deleted","assigned","reassigned","status_changed","login","logout","note_added","note_deleted"],
  ANALYTICS_EVENT_TYPES: ["page_view","click","dead_click","rage_click","scroll_depth","navigation","search","filter","time_on_page"],
  DB_NAME: "saleshub_db",
  DB_VERSION: 1,
  SESSION_KEY: "saleshub_session",
  TOAST_DURATION: 3000,
  RAGE_CLICK_THRESHOLD: 3,
  RAGE_CLICK_WINDOW: 1000
};

/* ============================================
   APPAUTH — Authentication & Session
   ============================================ */
const AppAuth = (() => {
  async function hashPassword(password) {
    const encoder = new TextEncoder();
    const buffer = await crypto.subtle.digest("SHA-256", encoder.encode(password));
    return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, "0")).join("");
  }

  async function login(email, password) {
    const users = await AppDB.getAll("users");
    const user = users.find(u => u.email === email);
    if (!user) throw new Error("Invalid email or password");
    const hash = await hashPassword(password);
    if (hash !== user.passwordHash) throw new Error("Invalid email or password");
    const session = { id: user.id, name: user.name, email: user.email, role: user.role, avatar: user.avatar || user.name.charAt(0).toUpperCase() };
    sessionStorage.setItem(AppConfig.SESSION_KEY, JSON.stringify(session));
    return session;
  }

  function logout() {
    sessionStorage.removeItem(AppConfig.SESSION_KEY);
    window.location.hash = "";
    location.reload();
  }

  function getSession() {
    const raw = sessionStorage.getItem(AppConfig.SESSION_KEY);
    if (!raw) return null;
    try { return JSON.parse(raw); } catch { return null; }
  }

  function isAuthenticated() {
    return getSession() !== null;
  }

  function getRole() {
    const s = getSession();
    return s ? s.role : null;
  }

  function hasPermission(perm) {
    const role = getRole();
    if (!role) return false;
    if (role === AppConfig.ROLES.SUPER_ADMIN) return true;
    return (AppConfig.PERMISSIONS[role] || []).includes(perm);
  }

  function requireAuth() {
    if (!isAuthenticated()) {
      window.location.hash = "";
      renderLoginPage();
      return false;
    }
    return true;
  }

  async function createUser(userData) {
    const hash = await hashPassword(userData.password);
    return AppDB.put("users", {
      name: userData.name,
      email: userData.email,
      passwordHash: hash,
      role: userData.role || AppConfig.ROLES.EMPLOYEE,
      createdAt: new Date().toISOString(),
      avatar: userData.name.split(" ").map(w => w[0]).join("").toUpperCase()
    });
  }

  async function deleteUser(userId) {
    return AppDB.del("users", userId);
  }

  async function getUsers() {
    return AppDB.getAll("users");
  }

  return { login, logout, getSession, isAuthenticated, getRole, hasPermission, requireAuth, createUser, deleteUser, getUsers, hashPassword };
})();

/* ============================================
   APPDB — IndexedDB Data Layer
   ============================================ */
const AppDB = (() => {
  let db = null;

  async function init() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(AppConfig.DB_NAME, AppConfig.DB_VERSION);
      request.onerror = () => reject(request.error);
      request.onsuccess = () => { db = request.result; resolve(db); };
      request.onupgradeneeded = (event) => {
        const d = event.target.result;

        // 1. users
        const users = d.createObjectStore("users", { keyPath: "id", autoIncrement: true });
        users.createIndex("email_idx", "email", { unique: true });
        users.createIndex("role_idx", "role", { unique: false });

        // 2. roles
        const roles = d.createObjectStore("roles", { keyPath: "id", autoIncrement: true });
        roles.createIndex("key_idx", "key", { unique: true });

        // 3. customers
        const customers = d.createObjectStore("customers", { keyPath: "id" });
        customers.createIndex("name_idx", "fullName", { unique: false });
        customers.createIndex("source_idx", "source", { unique: false });
        customers.createIndex("status_idx", "status", { unique: false });
        customers.createIndex("assigned_idx", "assignedTo", { unique: false });

        // 4. customer_notes
        const notes = d.createObjectStore("customer_notes", { keyPath: "id", autoIncrement: true });
        notes.createIndex("customer_idx", "customerId", { unique: false });
        notes.createIndex("user_idx", "userId", { unique: false });
        notes.createIndex("created_idx", "createdAt", { unique: false });

        // 5. tasks
        const tasks = d.createObjectStore("tasks", { keyPath: "id", autoIncrement: true });
        tasks.createIndex("assignee_idx", "assignedTo", { unique: false });
        tasks.createIndex("customer_idx", "customerId", { unique: false });
        tasks.createIndex("status_idx", "status", { unique: false });
        tasks.createIndex("priority_idx", "priority", { unique: false });

        // 6. notifications
        const notifs = d.createObjectStore("notifications", { keyPath: "id", autoIncrement: true });
        notifs.createIndex("user_idx", "userId", { unique: false });
        notifs.createIndex("type_idx", "type", { unique: false });
        notifs.createIndex("read_idx", "isRead", { unique: false });
        notifs.createIndex("created_idx", "createdAt", { unique: false });

        // 7. audit_logs
        const audit = d.createObjectStore("audit_logs", { keyPath: "id", autoIncrement: true });
        audit.createIndex("user_idx", "userId", { unique: false });
        audit.createIndex("action_idx", "action", { unique: false });
        audit.createIndex("entity_idx", "entityType", { unique: false });
        audit.createIndex("ts_idx", "timestamp", { unique: false });

        // 8. analytics_events
        const analytics = d.createObjectStore("analytics_events", { keyPath: "id", autoIncrement: true });
        analytics.createIndex("user_idx", "userId", { unique: false });
        analytics.createIndex("event_idx", "eventType", { unique: false });
        analytics.createIndex("page_idx", "page", { unique: false });
        analytics.createIndex("ts_idx", "timestamp", { unique: false });

        // 9. settings
        d.createObjectStore("settings", { keyPath: "key" });
      };
    });
  }

  /* Generic CRUD helpers */
  function tx(store, mode) { return db.transaction(store, mode).objectStore(store); }

  async function getAll(store) {
    return new Promise((resolve, reject) => {
      const r = tx(store, "readonly").getAll();
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    });
  }

  async function get(store, key) {
    return new Promise((resolve, reject) => {
      const r = tx(store, "readonly").get(key);
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    });
  }

  async function put(store, data) {
    return new Promise((resolve, reject) => {
      const r = tx(store, "readwrite").put(data);
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    });
  }

  async function del(store, key) {
    return new Promise((resolve, reject) => {
      const r = tx(store, "readwrite").delete(key);
      r.onsuccess = () => resolve();
      r.onerror = () => reject(r.error);
    });
  }

  async function count(store) {
    return new Promise((resolve, reject) => {
      const r = tx(store, "readonly").count();
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    });
  }

  /* Customers */
  function getCustomers() { return getAll("customers"); }
  function getCustomer(id) { return get("customers", id); }
  function saveCustomer(customer) { return put("customers", { ...customer, updatedAt: new Date().toISOString() }); }
  function deleteCustomer(id) { return del("customers", id); }

  /* Customer Notes */
  function getNotes(customerId) { return getAll("customer_notes").then(notes => notes.filter(n => n.customerId === customerId)); }
  function saveNote(note) { return put("customer_notes", { ...note, createdAt: new Date().toISOString() }); }
  function deleteNote(id) { return del("customer_notes", id); }

  /* Tasks */
  function getTasks() { return getAll("tasks"); }
  function getTask(id) { return get("tasks", id); }
  function saveTask(task) { return put("tasks", { ...task, updatedAt: new Date().toISOString() }); }
  function deleteTask(id) { return del("tasks", id); }

  /* Notifications */
  function getNotifications(userId) { return getAll("notifications").then(n => n.filter(x => x.userId === userId)); }

/* ============================================
   LOGIN PAGE
   ============================================ */
function renderLoginPage(errorMsg) {
  document.getElementById('app').style.display = 'none';
  document.body.innerHTML = `
    <div class="login-page">
      <div class="login-card">
        <div class="login-logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="12" width="3" height="9" rx="1"/><rect x="10" y="7" width="3" height="14" rx="1"/><rect x="17" y="3" width="3" height="18" rx="1"/></svg>
          <span>SalesHub</span>
        </div>
        <h1>Welcome back</h1>
        <p class="login-subtitle">Sign in to your account</p>
        <div class="login-error ${errorMsg ? 'visible' : ''}" id="login-error">${errorMsg || ''}</div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="login-email" placeholder="admin@saleshub.com" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="login-password" placeholder="Enter your password" autocomplete="current-password">
        </div>
        <div class="form-error" id="login-field-error"></div>
        <button class="btn-primary" id="login-btn">Sign In</button>
      </div>
    </div>
  `;

  const emailInput = document.getElementById('login-email');
  const passInput = document.getElementById('login-password');
  const loginBtn = document.getElementById('login-btn');
  const fieldError = document.getElementById('login-field-error');
  const loginError = document.getElementById('login-error');

  function showFieldError(msg) {
    fieldError.textContent = msg;
    fieldError.classList.add('visible');
  }
  function clearFieldError() {
    fieldError.textContent = '';
    fieldError.classList.remove('visible');
  }
  function setLoading(loading) {
    loginBtn.textContent = loading ? 'Signing in...' : 'Sign In';
    loginBtn.disabled = loading;
  }

  async function handleLogin() {
    clearFieldError();
    if (loginError) { loginError.textContent = ''; loginError.classList.remove('visible'); }
    const email = emailInput.value.trim();
    const password = passInput.value;
    if (!email) { showFieldError('Email is required'); return; }
    if (!password) { showFieldError('Password is required'); return; }
    setLoading(true);
    try {
      await AppAuth.login(email, password);
      setLoading(false);
      window.location.reload();
    } catch (err) {
      setLoading(false);
      showFieldError(err.message || 'Login failed');
    }
  }

  loginBtn.addEventListener('click', handleLogin);
  passInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
  emailInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') passInput.focus(); });
}
